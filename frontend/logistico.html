<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Logístico</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body data-role="logistico" onload="validarAcceso(['jacobo'])">

    <header class="topbar">
        <div>
            <span class="etiqueta-rol">jacobo</span>
            <h1>Encargado Logístico</h1>
        </div>
        <button onclick="cerrarSesion()">Cerrar sesión</button>
    </header>

    <nav class="menu-principal">
        <a href="#productos">Productos</a>
        <a href="#entregas">Entregas y devoluciones</a>
    </nav>

    <main class="layout">
        <section class="bienvenida">
            <h2>Módulo Logístico</h2>
            <p>Aquí puede revisar entregas, devoluciones y estado del inventario de andamios.</p>
        </section>

        <section class="seccion" id="productos">
            <h2>Inventario de productos</h2>
            <div class="productos-grid" id="contenedorProductos"></div>
        </section>

        <section class="seccion" id="entregas">
            <h2>Registros logísticos</h2>
            <div class="tabla-contenedor">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Cliente</th>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Dirección</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tablaAlquileres"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
